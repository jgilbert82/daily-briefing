name: Daily Briefing

on:
  schedule:
    # Runs at 06:00 Copenhagen time (05:00 UTC in winter, 04:00 UTC in summer)
    # Set to 05:00 UTC to cover both — adjust if needed
    - cron: '0 5 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client anthropic

      - name: Generate briefing
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily briefing $(date +'%Y-%m-%d')"
          git push
