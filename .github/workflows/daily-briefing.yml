name: Daily Briefing

on:
  schedule:
    # 05:00 UTC = 06:00 Copenhagen (winter/CET)
    # Change to '0 4 * * 1-5' for summer (CEST, UTC+2)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-briefing]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install notion-client anthropic

      - name: Generate briefing
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily briefing $(date +'%Y-%m-%d %H:%M')"
          git push
